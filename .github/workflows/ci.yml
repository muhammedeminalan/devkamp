name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kurulum
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Bagimlilik yukle
        run: flutter pub get

      - name: .env olustur (CI icin placeholder)
        env:
          GEMINI_KEY: "ci_placeholder"
        run: echo "GEMINI_API_KEY=$GEMINI_KEY" > .env

      - name: Kod uretimi
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analiz
        run: flutter analyze --no-pub

      - name: Testler
        run: flutter test --no-pub
