<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180" role="img" aria-label="DevKamp developer at desk illustration">
  <!-- desk -->
  <rect x="20" y="130" width="200" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="40" y="136" width="6" height="22" fill="#D1D5DB"/>
  <rect x="194" y="136" width="6" height="22" fill="#D1D5DB"/>

  <!-- floor -->
  <ellipse cx="120" cy="166" rx="100" ry="6" fill="#EEF2FF"/>

  <!-- monitor -->
  <rect x="70" y="60" width="100" height="62" rx="6" fill="#1E1E2E"/>
  <rect x="74" y="64" width="92" height="50" rx="2" fill="#312E81"/>
  <rect x="80" y="72" width="36" height="3" rx="1.5" fill="#A5B4FC"/>
  <rect x="80" y="80" width="60" height="3" rx="1.5" fill="#818CF8"/>
  <rect x="80" y="88" width="44" height="3" rx="1.5" fill="#A5B4FC"/>
  <rect x="80" y="100" width="28" height="6" rx="2" fill="#4F46E5"/>
  <rect x="112" y="100" width="20" height="6" rx="2" fill="#10B981"/>
  <rect x="115" y="122" width="10" height="6" fill="#1E1E2E"/>
  <rect x="100" y="128" width="40" height="3" rx="1.5" fill="#1E1E2E"/>

  <!-- chair -->
  <rect x="92" y="140" width="56" height="14" rx="3" fill="#4F46E5"/>
  <rect x="116" y="154" width="8" height="14" fill="#374151"/>
  <circle cx="100" cy="170" r="4" fill="#374151"/>
  <circle cx="140" cy="170" r="4" fill="#374151"/>

  <!-- person: back view -->
  <circle cx="120" cy="46" r="14" fill="#FBCFE8"/>
  <path d="M104 46 q0 -16 16 -16 t16 16" fill="#1F2937"/>
  <path d="M96 110 q0 -42 24 -42 t24 42 v22 h-48 z" fill="#6366F1"/>
  <rect x="96" y="106" width="48" height="8" fill="#4338CA"/>

  <!-- coffee -->
  <rect x="180" y="116" width="14" height="14" rx="2" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <path d="M194 119h4a3 3 0 0 1 0 6h-4" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <path d="M183 112q1 -3 0 -6m4 6q1 -3 0 -6" stroke="#9CA3AF" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- floating code symbols -->
  <text x="40" y="50" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="14" fill="#4F46E5">&lt;/&gt;</text>
  <text x="190" y="40" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="14" fill="#10B981">{}</text>
  <circle cx="34" cy="84" r="3" fill="#F59E0B"/>
  <rect x="200" y="78" width="6" height="6" rx="1.5" fill="#EC4899"/>
</svg>
