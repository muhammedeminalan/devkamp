name: app
description: "DevKamp - AI destekli teknik mulakat hazirlik uygulamasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  # Framework
  flutter:
    sdk: flutter

  # Architecture / State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Utilities / Extensions
  wonzy_core_utils: ^2.0.0

  # SVG
  flutter_svg: ^2.0.10+1

  # Lottie
  lottie: ^3.1.2

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter

  # Lints
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/lottie/
    - assets/fonts/

  # Typography
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
