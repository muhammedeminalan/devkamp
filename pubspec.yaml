name: app
description: "DevKamp - AI destekli teknik mulakat hazirlik uygulamasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.7.0
  google_sign_in: ^6.3.0

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Utils
  wonzy_core_utils: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint
  very_good_analysis: ^7.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.11.1
  injectable_generator: ^2.9.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/lottie/
    - assets/fonts/

  # Typography
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
